<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B7Store - Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section class="breadcrumb text-sm text-gray-500 font-medium mb-6">Home &gt; Camisetas</section>

        <section class="info flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-gray-200 pb-4 mb-8">
            <div class="product-qt text-gray-600 font-medium"><span class="font-bold text-black text-lg">12</span> Produtos encontrados</div>
            <div class="top-buttons flex gap-3 items-center">
                <div class="top-button flex items-center gap-2 border bg-white px-4 py-2 rounded-lg cursor-pointer hover:bg-gray-50 text-sm font-semibold" data-name="order">
                    <div class="top-button-name">Ordenar</div>
                    <img src="assets/images/ui/arrow-up-down-line.png" alt="" class="w-4 h-4" />
                </div>
                <div class="top-button md:hidden flex items-center gap-2 border bg-white px-4 py-2 rounded-lg cursor-pointer hover:bg-gray-50 text-sm font-semibold" data-name="filter">
                    <div class="top-button-name">Filtrar</div>
                    <img src="assets/images/ui/equalizer-2-line.png" alt="" class="w-4 h-4" />
                </div>
                <div class="order-area flex items-center gap-2 text-sm bg-white border rounded-lg px-3 py-1.5">
                    <label for="order" class="text-gray-500 font-medium">Ordenar por:</label>
                    <select id="order" name="order" class="bg-transparent font-bold outline-none cursor-pointer">
                        <option value="price">Por preço</option>
                        <option value="bestselling">Por mais vendidos</option>
                        <option value="alpha">Por ordem alfabética</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="products flex flex-col md:flex-row gap-8">
            <div class="filters hidden md:block w-full md:w-64 flex-shrink-0 space-y-4">
                
                <div class="filter bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                    <div class="filter-header flex justify-between items-center cursor-pointer font-bold text-gray-800 border-b border-gray-50 pb-2 mb-3">
                        <div class="filter-name">Tecnologia</div>
                        <img class="filter-icon w-4 h-4 -rotate-90" src="assets/images/ui/arrow-left-s-line.png" alt="" />
                    </div>
                    <div class="filter-body flex flex-col gap-2.5 text-sm text-gray-600">
                        <label class="filter-option flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="tecnologia" value="rn" class="w-4 h-4 rounded text-black border-gray-300 focus:ring-black" />
                            <span>React Native</span>
                        </label>
                        <label class="filter-option flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="tecnologia" value="node" class="w-4 h-4 rounded text-black border-gray-300 focus:ring-black" />
                            <span>Node</span>
                        </label>
                        <label class="filter-option flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="tecnologia" value="laravel" class="w-4 h-4 rounded text-black border-gray-300 focus:ring-black" />
                            <span>Laravel</span>
                        </label>
                        <label class="filter-option flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="tecnologia" value="react" class="w-4 h-4 rounded text-black border-gray-300 focus:ring-black" />
                            <span>React</span>
                        </label>
                    </div>
                </div>

                </div>

            <div class="grid flex-1 grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="product-item group bg-white border rounded-xl overflow-hidden relative shadow-sm hover:shadow-md transition">
                    <a href="product.html" class="block p-4">
                        <div class="product-photo bg-gray-50 rounded-lg aspect-square flex items-center justify-center mb-4"><img src="assets/images/products/camiseta-css.png" alt="" class="w-full h-full object-contain" /></div>
                        <div class="product-name font-semibold text-gray-800">Camisa CSS - Azul</div>
                        <div class="product-price text-xl font-bold mt-1">R$ 59,90</div>
                        <div class="product-info text-xs font-medium text-emerald-600 mt-1">Pagamento via PIX</div>
                    </a>
                    <div class="product-fav absolute top-6 right-6 p-2 bg-white rounded-full shadow-md cursor-pointer"><img src="assets/images/ui/heart-3-line.png" alt="" class="w-5 h-5"/></div>
                </div>
                
                <div class="product-item group bg-white border rounded-xl overflow-hidden relative shadow-sm hover:shadow-md transition">
                    <a href="product.html" class="block p-4"><div class="product-photo bg-gray-50 rounded-lg aspect-square flex items-center justify-center mb-4"><img src="assets/images/products/camiseta-css.png" alt="" class="w-full h-full object-contain" /></div><div class="product-name font-semibold text-gray-800">Camisa CSS - Azul</div><div class="product-price text-xl font-bold mt-1">R$ 59,90</div><div class="product-info text-xs font-medium text-emerald-600 mt-1">Pagamento via PIX</div></a><div class="product-fav absolute top-6 right-6 p-2 bg-white rounded-full shadow-md"><img src="assets/images/ui/heart-3-line.png" alt="" class="w-5 h-5"/></div>
                </div>
            </div>
        </section>
    </main>

    <script type="text/javascript" src="assets/js/header.js"></script>
    <script type="text/javascript" src="assets/js/produtos.js"></script>
</body>
</html>
