<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - B7Store</title>
    <link rel="stylesheet" href="/css/output.css" />
</head>

<body class="bg-[#F9F9F9] font-poppins min-h-screen flex flex-col">

    <header class="bg-white border-b border-[#D9D9D9]">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/"><img src="/assets/images/ui/logo-black.png" alt="B7Store" class="h-8" /></a>
            <a href="/" class="text-sm text-[#7F7F7F] hover:text-[#1a1a1a] transition-colors">← Voltar para a loja</a>
        </div>
    </header>

    <div class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="bg-white border border-[#D9D9D9] rounded-xl p-8 shadow-sm">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-[#1a1a1a]">Bem-vindo de volta</h1>
                    <p class="text-sm text-[#7F7F7F] mt-1">Entre na sua conta B7Store</p>
                </div>

                <div id="alert" class="hidden mb-4 p-3 rounded text-sm font-medium"></div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-[#1a1a1a] mb-1.5">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com"
                            class="w-full border border-[#D9D9D9] rounded px-4 py-3 text-sm outline-none focus:border-[#1D4FFE] transition-colors"
                            required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-[#1a1a1a] mb-1.5">Senha</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" placeholder="••••••••"
                                class="w-full border border-[#D9D9D9] rounded px-4 py-3 text-sm outline-none focus:border-[#1D4FFE] transition-colors pr-10"
                                required />
                            <button type="button" id="togglePwd"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-[#7F7F7F] hover:text-[#1a1a1a]">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-[#1D4FFE] text-white font-semibold py-3 rounded hover:bg-blue-700 transition-colors text-sm flex items-center justify-center gap-2">
                        <span>Entrar</span>
                        <svg id="spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                        </svg>
                    </button>
                </form>

                <p class="text-center text-sm text-[#7F7F7F] mt-6">
                    Não tem conta?
                    <a href="/register.html" class="text-[#1D4FFE] font-medium hover:underline">Criar conta grátis</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        });

        function showAlert(msg, type = 'error') {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = `mb-4 p-3 rounded text-sm font-medium ${type === 'error'
                ? 'bg-red-50 text-red-700 border border-red-200'
                : 'bg-green-50 text-green-700 border border-green-200'}`;
            el.classList.remove('hidden');
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn     = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            btn.disabled  = true;
            spinner.classList.remove('hidden');

            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email:    document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) { showAlert(data.error); return; }

                showAlert('Login realizado! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin' ? '/admin/produtos.html' : '/';
                }, 800);
            } catch {
                showAlert('Erro de conexão. Verifique se o servidor está rodando.');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });

        // Se já logado, redirecionar
        if (document.cookie.includes('token=')) window.location.href = '/';
    </script>
</body>
</html>
