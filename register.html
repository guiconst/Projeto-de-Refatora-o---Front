<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Conta - B7Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-poppins min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/"><img src="/assets/images/ui/logo-black.png" alt="B7Store" class="h-8" /></a>
            <a href="/" class="text-sm text-gray-500 hover:text-gray-900 transition-colors">← Voltar para a loja</a>
        </div>
    </header>

    <div class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="bg-white border border-gray-200 rounded-xl p-8 shadow-sm">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900">Criar conta</h1>
                    <p class="text-sm text-gray-500 mt-1">Cadastre-se e aproveite as melhores ofertas</p>
                </div>

                <div id="alert" class="hidden mb-4 p-3 rounded text-sm font-medium"></div>

                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-900 mb-1.5">Nome completo</label>
                        <input type="text" id="name" name="name" placeholder="Seu nome"
                            class="w-full border border-gray-200 rounded px-4 py-3 text-sm outline-none focus:border-blue-600 transition-colors"
                            required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-900 mb-1.5">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com"
                            class="w-full border border-gray-200 rounded px-4 py-3 text-sm outline-none focus:border-blue-600 transition-colors"
                            required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-900 mb-1.5">Senha</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres"
                                class="w-full border border-gray-200 rounded px-4 py-3 text-sm outline-none focus:border-blue-600 transition-colors pr-10"
                                required minlength="6" />
                            <button type="button" id="togglePwd"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                        <div class="mt-1 h-1 w-full bg-gray-200 rounded overflow-hidden">
                            <div id="strengthFill" class="h-full w-0 transition-all duration-300"></div>
                        </div>
                        <p id="strengthText" class="text-xs text-gray-500 mt-1"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-900 mb-1.5">Confirmar senha</label>
                        <input type="password" id="confirmPassword" placeholder="Repita a senha"
                            class="w-full border border-gray-200 rounded px-4 py-3 text-sm outline-none focus:border-blue-600 transition-colors"
                            required />
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 text-white font-semibold py-3 rounded hover:bg-blue-700 transition-colors text-sm flex items-center justify-center gap-2 mt-2">
                        <span>Criar conta</span>
                        <svg id="spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                        </svg>
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Já tem conta?
                    <a href="/login.html" class="text-blue-600 font-medium hover:underline">Entrar</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('togglePwd').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('password').addEventListener('input', function () {
            const val    = this.value;
            const fill   = document.getElementById('strengthFill');
            const text   = document.getElementById('strengthText');
            let strength = 0;
            if (val.length >= 6)              strength++;
            if (val.length >= 10)             strength++;
            if (/[A-Z]/.test(val))            strength++;
            if (/[0-9]/.test(val))            strength++;
            if (/[^A-Za-z0-9]/.test(val))     strength++;

            const labels = ['', 'Muito fraca', 'Fraca', 'Razoável', 'Boa', 'Forte'];
            const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
            const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];

            fill.style.width           = widths[strength];
            fill.style.backgroundColor = colors[strength];
            text.textContent           = val.length > 0 ? `Senha: ${labels[strength]}` : '';
        });

        function showAlert(msg, type = 'error') {
            const el   = document.getElementById('alert');
            el.textContent = msg;
            el.className   = `mb-4 p-3 rounded text-sm font-medium ${type === 'error'
                ? 'bg-red-50 text-red-700 border border-red-200'
                : 'bg-green-50 text-green-700 border border-green-200'}`;
            el.classList.remove('hidden');
        }

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;
            if (password !== confirm) { showAlert('As senhas não coincidem.'); return; }

            const btn     = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            btn.disabled  = true;
            spinner.classList.remove('hidden');

            try {
                const res  = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        name:  document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password
                    })
                });
                const data = await res.json();
                if (!res.ok) { showAlert(data.error); return; }
                showAlert('Conta criada! Redirecionando...', 'success');
                setTimeout(() => window.location.href = '/', 1000);
            } catch {
                showAlert('Erro de conexão. Verifique se o servidor está rodando.');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
